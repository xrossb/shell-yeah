#:schema https://dystroy.org/bacon/.bacon.schema.json

default_job = "run"
env.CARGO_TERM_COLOR = "always"

[jobs.run]
command = [
    "cargo", "run",
]
env.LOG_LEVEL = "debug"
env.LOG_STYLE = "always"
watch = [
    "styles",
]
need_stdout = true
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
